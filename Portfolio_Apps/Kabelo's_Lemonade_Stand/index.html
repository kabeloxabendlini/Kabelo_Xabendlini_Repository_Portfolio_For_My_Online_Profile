<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lemonade Stand</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🍋 The Lemonade Stand</h1>
        <p>Check the forecast, set your price, and open the stand!</p>
    </header>

    <main>
        <div class="section-label">7-day forecast</div>
        <section id="7DayWeather" class="weather-grid"></section>

        <div class="card">
            <div class="section-label">Your plan for the week</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="numGlasses">Glasses to make this week</label>
                    <input type="number" id="numGlasses" placeholder="e.g. 200" min="1">
                </div>
                <div class="form-group">
                    <label for="glassPrice">Price per glass ($, min $0.50)</label>
                    <input type="number" id="glassPrice" placeholder="e.g. 1.25" step="0.01" min="0.5">
                </div>
            </div>
            <button id="OpenTheStand">Open the stand →</button>
            <div id="errorMsg" class="error hidden"></div>
        </div>

        <div class="card hidden" id="resultsCard">
            <div class="section-label">Weekly results</div>
            <div class="results-grid">
                <div class="res-stat"><div class="res-label">Glasses sold</div><div class="res-value" id="rSold"></div></div>
                <div class="res-stat"><div class="res-label">Leftover stock</div><div class="res-value" id="rLeft"></div></div>
                <div class="res-stat"><div class="res-label">Revenue</div><div class="res-value" id="rRev"></div></div>
                <div class="res-stat"><div class="res-label">Profit / Loss</div><div class="res-value" id="rProfit"></div></div>
            </div>
            <div id="dayResults" class="day-results"></div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
